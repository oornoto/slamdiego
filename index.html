<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slam Diego</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sand: #f5f0e8;
    --navy: #002D62;
    --gold: #FFC425;
    --brown: #7B3F00;
    --text: #1a1a1a;
    --muted: #888;
  }

  html, body {
    height: 100%;
    background: var(--sand);
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    position: relative;
  }

  /* thin top rule */
  .page::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--navy) 0%, var(--gold) 50%, var(--navy) 100%);
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 6.5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
  }

  .wordmark em {
    font-style: italic;
    color: var(--gold);
    -webkit-text-stroke: 1px var(--brown);
  }

  .tagline {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 56px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }

  .fact-container {
    max-width: 560px;
    width: 100%;
    text-align: center;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
  }

  .fact-date {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    display: block;
  }

  .fact-rule {
    width: 40px;
    height: 2px;
    background: var(--navy);
    margin: 0 auto 24px;
  }

  .fact-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.05rem, 2.5vw, 1.3rem);
    line-height: 1.65;
    color: var(--text);
    min-height: 80px;
    position: relative;
  }

  .fact-text.loading {
    color: var(--muted);
    font-style: italic;
    font-size: 0.9rem;
  }

  .fact-number {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 14vw, 8rem);
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    margin: 28px 0 8px;
    letter-spacing: -0.04em;
    opacity: 0.08;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    white-space: nowrap;
  }

  .contact {
    margin-top: 56px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
  }

  .contact a {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--navy);
    text-decoration: none;
    border-bottom: 1px solid var(--navy);
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }

  .contact a:hover {
    color: var(--brown);
    border-color: var(--gold);
  }

  /* hidden portal link */
  .portal {
    position: fixed;
    bottom: 18px;
    right: 22px;
    font-size: 0.9rem;
    opacity: 0.18;
    transition: opacity 0.3s;
    text-decoration: none;
    cursor: pointer;
    z-index: 10;
    line-height: 1;
  }
  .portal:hover { opacity: 0.7; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* refresh button */
  .refresh {
    margin-top: 20px;
    background: none;
    border: 1px solid #ccc;
    border-radius: 99px;
    padding: 5px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh:hover { border-color: var(--navy); color: var(--navy); }
</style>
</head>
<body>
<div class="page">
  <div class="wordmark">Slam <em>Diego</em></div>
  <div class="tagline">San Diego Padres · Est. 1969</div>

  <div class="fact-container">
    <span class="fact-date" id="fact-date"></span>
    <div class="fact-rule"></div>
    <div class="fact-text loading" id="fact-text">Consulting the scorebook…</div>
    <button class="refresh" id="refresh-btn" onclick="loadFact()">↻ New Fact</button>
  </div>

  <div class="contact">
    <a href="mailto:josh@slamdiego.com">josh@slamdiego.com</a>
  </div>
</div>

<a class="portal" href="/dashboard" title="">⚾</a>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function formatDate(d) {
  return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

async function loadFact() {
  const factEl = document.getElementById('fact-text');
  const dateEl = document.getElementById('fact-date');
  const btn = document.getElementById('refresh-btn');

  const today = new Date();
  dateEl.textContent = formatDate(today);

  factEl.className = 'fact-text loading';
  factEl.textContent = 'Consulting the scorebook…';
  btn.disabled = true;

  const month = today.getMonth() + 1;
  const day = today.getDate();

  const prompt = `You are a San Diego Padres historian and statistician. Today is ${formatDate(today)} (month ${month}, day ${day}).

Generate a single, compelling, stats-driven Padres fact for today. Focus on one of:
- A notable Padres game or event that happened on this calendar date (any year)
- A remarkable statistical achievement or milestone in franchise history
- A fascinating historical stat or record about the Padres
- A notable player's career stat or milestone that Padres fans would love

Requirements:
- Lead with a specific number or statistic (WAR, ERA, batting average, wins, streak, etc.)
- Be precise — use real statistics
- Be 2–4 sentences maximum
- Do NOT mention AI or that you are generating this
- Write as if it's a caption in a baseball almanac
- End with the year in parentheses if referencing a specific event

Just write the fact, nothing else. No preamble, no title.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const text = data?.content?.[0]?.text?.trim();
    if (text) {
      factEl.className = 'fact-text';
      factEl.textContent = text;
    } else {
      throw new Error('No content');
    }
  } catch(e) {
    factEl.className = 'fact-text';
    factEl.textContent = 'Tony Gwynn hit .338 lifetime — the highest career average of any player with 7,000+ plate appearances since Ted Williams. He never finished lower than .309 in any full season. (1982–2001)';
  }

  btn.disabled = false;
}

loadFact();
</script>
</body>
</html>
